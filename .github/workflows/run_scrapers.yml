name: Run All Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"   # Every 12 hours

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Add project to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      # ── SCRAPERS ─────────────────────────────────────────────────────────────
      # Each scraper runs independently with continue-on-error: true
      # A single scraper failure does NOT stop the others or the sync step
      # Firebase env vars injected per-step for isolation

      - name: Run AI Tools Scraper
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          echo "→ Starting AI Tools scraper..."
          python data_pipeline/scrapers/ai_tools.py && echo "✅ AI Tools done" || echo "⚠️ AI Tools failed (non-blocking)"

      - name: Run Education Scraper
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          echo "→ Starting Education scraper..."
          python data_pipeline/scrapers/education.py && echo "✅ Education done" || echo "⚠️ Education failed (non-blocking)"

      - name: Run Islamic Scraper
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          echo "→ Starting Islamic scraper..."
          python data_pipeline/scrapers/islamic.py && echo "✅ Islamic done" || echo "⚠️ Islamic failed (non-blocking)"

      - name: Run Marketplace Scraper
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
        run: |
          echo "→ Starting Marketplace scraper..."
          python data_pipeline/scrapers/marketplace.py && echo "✅ Marketplace done" || echo "⚠️ Marketplace failed (non-blocking)"

      - name: Run Productivity Scraper
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          echo "→ Starting Productivity scraper..."
          python data_pipeline/scrapers/productivity.py && echo "✅ Productivity done" || echo "⚠️ Productivity failed (non-blocking)"

      - name: Run Streams Scraper
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          echo "→ Starting Streams scraper..."
          python data_pipeline/scrapers/streams.py && echo "✅ Streams done" || echo "⚠️ Streams failed (non-blocking)"

      # ── SHOP INVENTORY SYNC ─────────────────────────────────────────────────
      # Runs ALWAYS — even if all scrapers above failed
      # eBay credentials live in Vercel env vars — NOT needed here
      # Only ADMIN_SECRET and NEXT_PUBLIC_SITE_URL needed from GitHub secrets
      # Loop runs until sync-worker returns { "done": true } — no hardcoded limit

      - name: Run Shop Inventory Sync
        # always() ensures this step runs even when previous steps fail
        if: always()
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          echo "========================================"
          echo "  HUSIN Shop Inventory Sync"
          echo "========================================"

          # Validate required secrets are present
          if [ -z "$ADMIN_SECRET" ]; then
            echo "❌ ADMIN_SECRET secret not set in GitHub — skipping sync"
            exit 0
          fi
          if [ -z "$SITE_URL" ]; then
            echo "❌ NEXT_PUBLIC_SITE_URL secret not set in GitHub — skipping sync"
            exit 0
          fi

          echo "Site: $SITE_URL"
          echo ""

          # ── STEP 1: Create sync job ────────────────────────────────────────
          echo "→ Creating sync job..."

          TRIGGER_RESPONSE=$(curl -s -X POST \
            "${SITE_URL}/api/shop/sync-trigger" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${ADMIN_SECRET}" \
            --connect-timeout 15 \
            --max-time 30 \
            2>/dev/null || echo '{"error":"curl_failed","done":true}')

          echo "Trigger: $TRIGGER_RESPONSE"

          # Parse response
          JOB_ID=$(echo "$TRIGGER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('jobId') or '')" \
            2>/dev/null || echo "")

          TOTAL=$(echo "$TRIGGER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('totalTasks') or 0)" \
            2>/dev/null || echo "0")

          ALREADY_DONE=$(echo "$TRIGGER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(str(d.get('done',False)).lower())" \
            2>/dev/null || echo "false")

          # No products to sync
          if [ -z "$JOB_ID" ] || [ "$ALREADY_DONE" = "true" ]; then
            echo "No live products to sync — skipping."
            echo "SYNC_TOTAL=0" >> $GITHUB_ENV
            echo "SYNC_ITERATIONS=0" >> $GITHUB_ENV
            exit 0
          fi

          echo "✅ Job: $JOB_ID — Products to check: $TOTAL"
          echo ""

          # ── STEP 2: Worker loop — NO hardcoded limit ───────────────────────
          # Runs until done:true is returned
          # Safety valve: MAX_CONSECUTIVE_ERRORS=5 aborts on repeated failures

          ITERATION=0
          DONE="false"
          CONSECUTIVE_ERRORS=0
          MAX_CONSECUTIVE_ERRORS=5

          while [ "$DONE" != "true" ]; do
            ITERATION=$((ITERATION + 1))

            WORKER_RESPONSE=$(curl -s -X POST \
              "${SITE_URL}/api/shop/sync-worker" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${ADMIN_SECRET}" \
              -d "{\"jobId\": \"${JOB_ID}\"}" \
              --connect-timeout 15 \
              --max-time 25 \
              2>/dev/null || echo '{"error":"curl_failed"}')

            # Parse fields
            DONE=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(str(d.get('done',False)).lower())" \
              2>/dev/null || echo "false")

            RESULT=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('result',''))" \
              2>/dev/null || echo "")

            MSG=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('message','no message'))" \
              2>/dev/null || echo "")

            ERR=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" \
              2>/dev/null || echo "")

            # Result icon
            if   [ "$RESULT" = "removed" ];       then ICON="🗑️ "
            elif [ "$RESULT" = "price_updated" ];  then ICON="💰"
            elif [ "$RESULT" = "unchanged" ];      then ICON="✅"
            elif [ "$RESULT" = "skipped" ];        then ICON="⏭️ "
            elif [ "$RESULT" = "failed" ];         then ICON="❌"
            else                                        ICON="⏳"
            fi

            echo "[$ITERATION/$TOTAL] $ICON $MSG"

            # Handle worker errors
            if [ -n "$ERR" ] && [ "$ERR" != "" ] && [ "$ERR" != "None" ] && [ "$ERR" != "null" ]; then
              CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
              echo "  ⚠️ Error ($CONSECUTIVE_ERRORS/$MAX_CONSECUTIVE_ERRORS): $ERR"

              if [ $CONSECUTIVE_ERRORS -ge $MAX_CONSECUTIVE_ERRORS ]; then
                echo ""
                echo "❌ $MAX_CONSECUTIVE_ERRORS consecutive errors — aborting sync"
                echo "   Check Vercel runtime logs for details"
                break
              fi

              # Back off on errors
              sleep 5
            else
              CONSECUTIVE_ERRORS=0
              sleep 2
            fi
          done

          # Pass stats to Telegram notification step
          echo "SYNC_TOTAL=${TOTAL:-0}" >> $GITHUB_ENV
          echo "SYNC_ITERATIONS=${ITERATION:-0}" >> $GITHUB_ENV

          echo ""
          echo "========================================"
          echo "  Sync complete after $ITERATION checks"
          echo "========================================"

      # ── EBAY DISCOVERY JOB ──────────────────────────────────────────────────
      # Runs after the inventory sync, same 12-hour cadence.
      # FIX (2026-06-28): this job existed but was never scheduled anywhere —
      # trigger.js/trigger-worker.js were only reachable by manual API call.
      # Also fixed a collection-name mismatch: trigger.js was writing tasks to
      # a per-job subcollection that trigger-worker.js never queried, so this
      # job would have silently done nothing even once scheduled.

      - name: Run eBay Discovery Job
        if: always()
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          echo "========================================"
          echo "  HUSIN eBay Discovery Job"
          echo "========================================"

          if [ -z "$ADMIN_SECRET" ]; then
            echo "❌ ADMIN_SECRET secret not set — skipping discovery"
            exit 0
          fi
          if [ -z "$SITE_URL" ]; then
            echo "❌ NEXT_PUBLIC_SITE_URL secret not set — skipping discovery"
            exit 0
          fi

          echo "Site: $SITE_URL"
          echo ""

          echo "→ Creating eBay search job..."

          TRIGGER_RESPONSE=$(curl -s -X POST \
            "${SITE_URL}/api/shop/trigger" \
            -H "Content-Type: application/json" \
            -H "x-shop-token: ${ADMIN_SECRET}" \
            -d '{"category": "all"}' \
            --connect-timeout 15 \
            --max-time 30 \
            2>/dev/null || echo '{"error":"curl_failed"}')

          echo "Trigger: $TRIGGER_RESPONSE"

          JOB_ID=$(echo "$TRIGGER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('jobId') or '')" \
            2>/dev/null || echo "")

          TOTAL=$(echo "$TRIGGER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('totalTasks') or 0)" \
            2>/dev/null || echo "0")

          if [ -z "$JOB_ID" ]; then
            echo "No job created (error or zero tasks) — skipping worker loop."
            echo "DISCOVERY_TOTAL=0" >> $GITHUB_ENV
            echo "DISCOVERY_ITERATIONS=0" >> $GITHUB_ENV
            exit 0
          fi

          echo "✅ Job: $JOB_ID — Search queries queued: $TOTAL"
          echo ""

          ITERATION=0
          DONE="false"
          CONSECUTIVE_ERRORS=0
          MAX_CONSECUTIVE_ERRORS=5

          while [ "$DONE" != "true" ]; do
            ITERATION=$((ITERATION + 1))

            WORKER_RESPONSE=$(curl -s -X POST \
              "${SITE_URL}/api/shop/trigger-worker" \
              -H "Content-Type: application/json" \
              -H "x-shop-token: ${ADMIN_SECRET}" \
              --connect-timeout 20 \
              --max-time 60 \
              2>/dev/null || echo '{"error":"curl_failed"}')

            DONE=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(str(d.get('done',False)).lower())" \
              2>/dev/null || echo "false")

            ACCEPTED=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('accepted',0))" \
              2>/dev/null || echo "0")

            REJECTED=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('rejected',0))" \
              2>/dev/null || echo "0")

            TASK=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('task','') or d.get('message',''))" \
              2>/dev/null || echo "")

            ERR=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" \
              2>/dev/null || echo "")

            echo "[$ITERATION/$TOTAL] 🔍 $TASK — accepted:$ACCEPTED rejected:$REJECTED"

            if [ -n "$ERR" ] && [ "$ERR" != "" ] && [ "$ERR" != "None" ] && [ "$ERR" != "null" ]; then
              CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
              echo "  ⚠️ Error ($CONSECUTIVE_ERRORS/$MAX_CONSECUTIVE_ERRORS): $ERR"

              if [ "$ERR" = "curl_failed" ]; then
                echo "  ⚠️ This may indicate a missing Firestore composite index —"
                echo "     check Vercel logs for trigger-worker.js (FAILED_PRECONDITION)."
              fi

              if [ $CONSECUTIVE_ERRORS -ge $MAX_CONSECUTIVE_ERRORS ]; then
                echo ""
                echo "❌ $MAX_CONSECUTIVE_ERRORS consecutive errors — aborting discovery job"
                echo "   Check Vercel runtime logs for details"
                break
              fi

              sleep 5
            else
              CONSECUTIVE_ERRORS=0
              sleep 1
            fi

            if [ $ITERATION -ge 500 ]; then
              echo "⚠️ Hit 500-iteration safety cap — stopping early."
              break
            fi
          done

          # Pass stats to Telegram notification step
          echo "DISCOVERY_TOTAL=${TOTAL:-0}" >> $GITHUB_ENV
          echo "DISCOVERY_ITERATIONS=${ITERATION:-0}" >> $GITHUB_ENV

          echo ""
          echo "========================================"
          echo "  eBay discovery complete after $ITERATION queries"
          echo "========================================"

      # ── ABANDONED CART REMINDER ──────────────────────────────────────────────
      # Runs after the eBay discovery job, same 12-hour cadence.
      # Calls /api/cron/abandoned-cart, which finds shop_orders still in
      # 'pending_payment' more than 24h after creation and sends a one-time
      # reminder email via the sales@husin.org alias. The endpoint itself is
      # idempotent (sets abandonedCartReminderSentAt so it never double-emails
      # the same order), so this step just needs to fire — no worker loop.

      - name: Run Abandoned Cart Reminder
        if: always()
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          echo "========================================"
          echo "  HUSIN Abandoned Cart Reminder"
          echo "========================================"

          if [ -z "$ADMIN_SECRET" ]; then
            echo "❌ ADMIN_SECRET secret not set — skipping"
            exit 0
          fi
          if [ -z "$SITE_URL" ]; then
            echo "❌ NEXT_PUBLIC_SITE_URL secret not set — skipping"
            exit 0
          fi

          echo "Site: $SITE_URL"
          echo ""

          RESPONSE=$(curl -s -X POST \
            "${SITE_URL}/api/cron/abandoned-cart" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${ADMIN_SECRET}" \
            --connect-timeout 15 \
            --max-time 60 \
            2>/dev/null || echo '{"error":"curl_failed"}')

          echo "Response: $RESPONSE"

          SENT=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('sent',0))" \
            2>/dev/null || echo "0")

          SKIPPED=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('skipped',0))" \
            2>/dev/null || echo "0")

          ERR=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" \
            2>/dev/null || echo "")

          if [ -n "$ERR" ] && [ "$ERR" != "" ] && [ "$ERR" != "None" ] && [ "$ERR" != "null" ]; then
            echo "⚠️ Error: $ERR"
            if [ "$ERR" = "curl_failed" ]; then
              echo "⚠️ This may indicate a missing Firestore composite index —"
              echo "   check Vercel logs for abandoned-cart.js (FAILED_PRECONDITION)."
            fi
          fi

          # Pass stats to Telegram notification step
          echo "CART_SENT=${SENT:-0}" >> $GITHUB_ENV
          echo "CART_SKIPPED=${SKIPPED:-0}" >> $GITHUB_ENV

          echo ""
          echo "========================================"
          echo "  Reminders sent: $SENT — Skipped: $SKIPPED"
          echo "========================================"

      # ── TELEGRAM NOTIFICATION ──────────────────────────────────────────────
      # Runs at the very end to notify you of the workflow completion

      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "========================================"
          echo "  Sending Telegram Notification"
          echo "========================================"
          
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "❌ Telegram Secrets missing — skipping notification"
            exit 0
          fi
          
          if [ -f "telegramNotifier.js" ]; then
            echo "→ Found telegramNotifier.js, executing..."
            node telegramNotifier.js
          else
            echo "⚠️ telegramNotifier.js not found. Sending detailed fallback message..."
            
            MESSAGE="✅ *HUSIN System Report*

          📦 *Inventory Sync:*
          • Target: ${SYNC_TOTAL:-0} products
          • Processed: ${SYNC_ITERATIONS:-0} cycles

          🔍 *eBay Discovery:*
          • Queued: ${DISCOVERY_TOTAL:-0} queries
          • Processed: ${DISCOVERY_ITERATIONS:-0} tasks

          🛒 *Abandoned Carts:*
          • Emails Sent: ${CART_SENT:-0}
          • Skipped: ${CART_SKIPPED:-0}

          🕒 *Time:* $(date -u)"
            
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode text="$MESSAGE" \
              -d parse_mode="Markdown" > /dev/null
              
            echo "✅ Telegram detailed message sent successfully!"
          fi
