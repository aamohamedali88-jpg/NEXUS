name: Run All Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"   # Runs every 12 hours

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Add project to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run AI Tools Scraper
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          python data_pipeline/scrapers/ai_tools.py

      - name: Run Education Scraper
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          python data_pipeline/scrapers/education.py

      - name: Run Islamic Scraper
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          python data_pipeline/scrapers/islamic.py

      - name: Run Marketplace Scraper
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}   # Optional
        run: |
          python data_pipeline/scrapers/marketplace.py

      - name: Run Productivity Scraper
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          python data_pipeline/scrapers/productivity.py

      - name: Run Streams Scraper
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        run: |
          python data_pipeline/scrapers/streams.py

      # ── SHOP INVENTORY SYNC ─────────────────────────────────────────────────
      # Phase 1 Production Hardening
      #
      # DESIGN PRINCIPLES:
      # - NO hardcoded iteration cap — loop runs until API returns done:true
      # - eBay credentials live in Vercel env vars — NOT passed from here
      # - Only ADMIN_SECRET and SITE_URL needed from GitHub secrets
      # - Each sync-worker call processes exactly 1 product in <10s
      # - sleep 2 between iterations prevents Vercel cold-start stacking
      # - GitHub Actions job timeout (6h default) is the only outer boundary
      #
      # WHAT HAPPENS:
      # 1. sync-trigger creates a Firestore job with one task per live product
      # 2. sync-worker loop pops tasks one by one from Firestore queue
      # 3. Each call checks eBay listing — removes if unavailable, updates if price drifted
      # 4. Loop exits only when sync-worker returns { "done": true }
      # 5. Telegram summary sent automatically by sync-worker on completion

      - name: Run Shop Inventory Sync
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          # NOTE: EBAY_APP_ID and EBAY_SECRET are NOT needed here.
          # They are Vercel environment variables read directly by sync-worker.js
          # via process.env — GitHub Actions only triggers the secure endpoint.
        run: |
          set -e
          echo "========================================"
          echo "  HUSIN Shop Inventory Sync — Phase 1"
          echo "========================================"
          echo ""

          # ── STEP 1: Create sync job ──────────────────────────────────────
          echo "→ Creating sync job..."

          TRIGGER_RESPONSE=$(curl -s -X POST \
            "${SITE_URL}/api/shop/sync-trigger" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${ADMIN_SECRET}" \
            --connect-timeout 10 \
            --max-time 20)

          echo "Trigger response: $TRIGGER_RESPONSE"

          # Parse jobId and totalTasks using Python (pre-installed on ubuntu-latest)
          JOB_ID=$(echo "$TRIGGER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('jobId') or '')" 2>/dev/null || echo "")

          TOTAL=$(echo "$TRIGGER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('totalTasks') or 0)" 2>/dev/null || echo "0")

          TRIGGER_DONE=$(echo "$TRIGGER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(str(d.get('done',False)).lower())" 2>/dev/null || echo "false")

          # No live products — nothing to sync
          if [ -z "$JOB_ID" ] || [ "$TRIGGER_DONE" = "true" ]; then
            echo "No live products to sync — skipping."
            exit 0
          fi

          echo ""
          echo "✅ Job created: $JOB_ID"
          echo "📦 Products to check: $TOTAL"
          echo ""

          # ── STEP 2: Process all tasks — loop until done:true ─────────────
          # NO hardcoded limit. The loop runs until the API signals completion.
          # This scales automatically to any number of live products.

          ITERATION=0
          DONE="false"
          ERRORS=0
          MAX_CONSECUTIVE_ERRORS=5  # Safety: abort if worker repeatedly fails

          echo "→ Starting worker loop..."
          echo ""

          while [ "$DONE" != "true" ]; do
            ITERATION=$((ITERATION + 1))

            WORKER_RESPONSE=$(curl -s -X POST \
              "${SITE_URL}/api/shop/sync-worker" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${ADMIN_SECRET}" \
              -d "{\"jobId\": \"${JOB_ID}\"}" \
              --connect-timeout 10 \
              --max-time 20 2>/dev/null || echo '{"error":"curl_failed"}')

            # Parse response fields
            DONE=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(str(d.get('done',False)).lower())" 2>/dev/null || echo "false")

            RESULT=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('result',''))" 2>/dev/null || echo "")

            MSG=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('message',''))" 2>/dev/null || echo "")

            ERR=$(echo "$WORKER_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" 2>/dev/null || echo "")

            # Log each iteration with result indicator
            if   [ "$RESULT" = "removed" ];       then ICON="🗑️ "
            elif [ "$RESULT" = "price_updated" ];  then ICON="💰"
            elif [ "$RESULT" = "unchanged" ];      then ICON="✅"
            elif [ "$RESULT" = "skipped" ];        then ICON="⏭️ "
            elif [ "$RESULT" = "failed" ];         then ICON="❌"
            else                                        ICON="⏳"
            fi

            echo "[$ITERATION/$TOTAL] $ICON $MSG"

            # Handle worker errors
            if [ -n "$ERR" ] && [ "$ERR" != "" ] && [ "$ERR" != "None" ]; then
              ERRORS=$((ERRORS + 1))
              echo "  ⚠️  Worker error ($ERRORS/$MAX_CONSECUTIVE_ERRORS): $ERR"

              if [ $ERRORS -ge $MAX_CONSECUTIVE_ERRORS ]; then
                echo ""
                echo "❌ Too many consecutive errors ($MAX_CONSECUTIVE_ERRORS). Aborting sync."
                echo "   Check Vercel logs for details: https://vercel.com/dashboard"
                exit 1
              fi
            else
              # Reset error counter on success
              ERRORS=0
            fi

            # Respect Vercel cold-start window and rate limits
            sleep 2
          done

          echo ""
          echo "========================================"
          echo "  Sync complete after $ITERATION iterations"
          echo "========================================"
